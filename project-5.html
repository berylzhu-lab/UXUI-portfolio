<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Detail | Jiajun Zhu Portfolio</title>
  
  <style>
    /* 全局暗黑背景重置，完美契合你主页的深色色调 */
    body {
      background-color: hsl(0, 0%, 7%); /* 默认黑灰色 */
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* 顶部导航条：给面试官留一条“生路”返回主页，极其重要！ */
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background-color: hsl(240, 2%, 12%); /* 接近 Onyx 的卡片底色 */
      border-bottom: 1px solid hsla(0, 0%, 100%, 0.1);
    }

    /* 返回主页按钮：默认使用你网站的高亮黄 */
    .back-btn {
      color: hsl(45, 100%, 72%); /* 主题黄 */
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: opacity 0.2s ease;
    }

    .back-btn:hover {
      opacity: 0.8;
    }

    .project-title {
      color: #ffffff;
      margin: 0;
      font-size: 16px;
      font-weight: 500;
    }

    /* PDF 播放器容器 */
    .pdf-container {
      flex: 1;
      width: 100%;
      height: calc(100vh - 60px);
      background-color: hsl(0, 0%, 7%);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div class="nav-bar">
    <a href="index.html" class="back-btn">
      ← Back to Portfolio
    </a>
    <h1 class="project-title">Lilaland</h1>
    <div style="width: 120px;"></div> 
  </div>

  <div class="pdf-container">
    <iframe src="./assets/pdf/lilaland.pdf" type="application/pdf"></iframe>
  </div>

</body>
</html>
